<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PnL Application</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root {
      --ax-dark: #1E0B4B;
      --ax-mid:  #6D28D9;
      --ax-grad: linear-gradient(135deg, #1E0B4B 0%, #6D28D9 55%, #C026D3 100%);
    }
    body {
      min-height: 100vh;
      background: var(--ax-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .logo-wrap { text-align: center; margin-bottom: 24px; }
    .logo-wrap img { width: 72px; height: 72px; border-radius: 14px; }
    .app-title { font-size: 20px; font-weight: 700; color: var(--ax-dark); margin-top: 10px; }
    .app-sub   { font-size: 12px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
    .btn-login {
      background: var(--ax-grad);
      border: none;
      width: 100%;
      padding: 10px;
      font-weight: 600;
      font-size: 15px;
      border-radius: 8px;
      color: white;
    }
    .btn-login:hover { opacity: 0.9; color: white; }
    .form-control:focus { border-color: var(--ax-mid); box-shadow: 0 0 0 3px rgba(109,40,217,0.15); }
    .error-msg { color: #dc3545; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="/static/img/logo.svg" alt="AutomatonsX"/>
      <div class="app-title">PnL Application</div>
      <div class="app-sub">AutomatonsX</div>
    </div>
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-login" id="login-btn">Sign In</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      btn.textContent = 'Signing in…'; btn.disabled = true; err.style.display = 'none';
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const json = await res.json();
      if (res.ok) {
        window.location.href = '/';
      } else {
        err.textContent = json.error || 'Login failed';
        err.style.display = 'block';
        btn.textContent = 'Sign In'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
